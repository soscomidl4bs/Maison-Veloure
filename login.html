<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/css/style.css">
        <title>Login Page</title>
    </head>
    <body class="login-page">

        <div class="page-wrapper">

            <div class="main-content">

                <div class="left">

                    <div class="form-box">

                        <div class="logo-img">
                            <img src="/asset/logo-mv.png" alt="Logo Maison Veloure">
                            <span>Pâtisserie & Boulangerie</span>
                        </div>

                        <div class="logo">Bienvenue</div>

                        <h2 class="title">MAISON VELOURE</h2>
                        <div class="subtitle">Connectez-vous à votre compte</div>

                        <form id="loginForm">
                            <div class="input-group">
                                <svg class="icon" viewBox="0 0 24 24">
                                    <path d="M2 4h20v16H2z" fill="none" stroke="#888"/>
                                    <path d="M2 4l10 9 10-9" fill="none" stroke="#888"/>
                                </svg>
                                <input type="email" id="email" placeholder="Adresse e-mail" required>
                            </div>

                            <div class="input-group">
                                <svg class="icon" viewBox="0 0 24 24">
                                    <rect x="4" y="10" width="16" height="10" rx="2" stroke="#888" fill="none"/>
                                    <path d="M8 10V7a4 4 0 0 1 8 0v3" stroke="#888" fill="none"/>
                                </svg>
                                <input type="password" id="password" placeholder="Mot de passe" required>
                            </div>

                            <div class="row">
                                <label class="remember">
                                    <input type="checkbox" style="color: #7a5c3e;"> Se souvenir de moi
                                </label>
                                <a href="#" style="color: #7a5c3e;">Mot de passe oublié ?</a>
                            </div>

                            <button type="submit">SE CONNECTER</button>

                        </form>

                        <div class="divider">ou continuer avec</div>

                        <div class="social">
                            <button class="google-btn">
                                <!-- Google Icon -->
                                <svg viewBox="0 0 48 48">
                                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.73 1.22 9.24 3.6l6.9-6.9C35.9 2.5 30.4 0 24 0 14.7 0 6.7 5.4 2.7 13.3l8.1 6.3C12.6 13.2 17.9 9.5 24 9.5z"/>
                                    <path fill="#34A853" d="M46.5 24c0-1.6-.14-3.1-.4-4.6H24v9h12.7c-.55 3-2.2 5.5-4.7 7.2l7.3 5.7C43.9 37.5 46.5 31.4 46.5 24z"/>
                                    <path fill="#FBBC05" d="M10.8 28.6c-1-3-1-6.2 0-9.2l-8.1-6.3C.9 16.5 0 20.1 0 24s.9 7.5 2.7 10.9l8.1-6.3z"/>
                                    <path fill="#4285F4" d="M24 48c6.4 0 11.8-2.1 15.7-5.7l-7.3-5.7c-2 1.4-4.6 2.2-8.4 2.2-6.1 0-11.4-3.7-13.2-9.1l-8.1 6.3C6.7 42.6 14.7 48 24 48z"/>
                                </svg>
                                Google
                            </button>

                            <button class="apple-btn">
                                <!-- Apple Icon -->
                                <svg viewBox="0 0 24 24" width="18">
                                    <path d="M16.4 13.6c0-2.1 1.7-3.1 1.8-3.2-1-1.5-2.5-1.7-3-1.7-1.3-.1-2.5.8-3.2.8s-1.8-.8-3-.8c-1.6 0-3 1-3.8 2.4-1.6 2.8-.4 6.9 1.1 9 .7 1 1.6 2.1 2.7 2.1 1.1 0 1.5-.7 2.8-.7s1.7.7 2.8.7c1.2 0 1.9-1 2.6-2 .8-1.1 1.1-2.2 1.1-2.2-.1 0-2.1-.8-2.1-3.4zM14.8 6.9c.6-.7 1-1.6.9-2.5-.9.1-1.9.6-2.5 1.3-.6.7-1.1 1.6-1 2.5.9.1 1.9-.5 2.6-1.3z"/>
                                </svg>
                                Apple
                            </button>
                            </div>

                            <p class="social-note">"L'art de la patisserie, le gout du bonheur"</p>
                            <p class="register-link">
                                Vous n’avez pas de compte ? 
                                <a href="register.html">S’inscrire</a>
                            </p>
                        </div>
                    </div>

                    <div class="right">
                        <img src="/asset/bg-login.png" alt="">
                    </div>

                </div>

            </div>

        </div>

        <script src="js/script.js" defer></script>
    </body>
</html>
